# =============================================================================
# GitLab CI/CD – Terragrunt / Azure PostgreSQL Flexible Server
#
# Pipeline behaviour
# ──────────────────
# • Every pipeline:                       validate → plan  (all environments)
# • Merge to default branch:              apply available as a manual trigger (all environments)
# • Pipeline with CONFIRM_DESTROY=true:   plan-destroy runs automatically, then destroy requires a manual trigger
#
# Required GitLab CI/CD variables  (Settings → CI/CD → Variables)
# ──────────────────────────────────────────────────────────────────
#   ARM_CLIENT_ID                 Service Principal app ID         (scope per environment)
#   ARM_CLIENT_SECRET             Service Principal secret          (masked, scope per environment)
#   ARM_TENANT_ID                 Azure AD tenant ID               (scope per environment)
#   (subscription ID is set per-environment via env.hcl, not as a CI variable)
#   POSTGRES_ADMIN_PASSWORD           DB admin password            (masked, scope per environment)
#   ARTIFACTORY_HOSTNAME              Artifactory hostname (e.g. artifactory.yourcompany.com)
#   ARTIFACTORY_REPO                  Artifactory Terraform provider repo name
#   ARTIFACTORY_TOKEN                 Artifactory identity token   (masked)
#
# CI_JOB_TOKEN and CI_PROJECT_ID are injected automatically by GitLab.
# =============================================================================

stages:
  - validate
  - plan
  - apply
  - plan-destroy
  - destroy

# Pin image versions here – update as new releases are published.
variables:
  TG_IMAGE: "alpine/terragrunt:0.67.6"   # bundles Terraform ~1.9.x
  TF_ROOT:  "${CI_PROJECT_DIR}/environments"

# ---------------------------------------------------------------------------
# Base job template
# - Writes a .terraformrc that routes all provider downloads through
#   the Artifactory network mirror, so no provider is fetched directly
#   from registry.terraform.io.
# - Exports Azure credentials so the azurerm provider can authenticate.
# ---------------------------------------------------------------------------
.base:
  image: ${TG_IMAGE}
  before_script:
    - |
      cat > /tmp/.terraformrc <<EOF
      credentials "${ARTIFACTORY_HOSTNAME}" {
        token = "${ARTIFACTORY_TOKEN}"
      }
      provider_installation {
        network_mirror {
          url = "https://${ARTIFACTORY_HOSTNAME}/artifactory/${ARTIFACTORY_REPO}/"
        }
      }
      EOF
    - export TF_CLI_CONFIG_FILE=/tmp/.terraformrc
    - export ARM_CLIENT_ID="${ARM_CLIENT_ID}"
    - export ARM_CLIENT_SECRET="${ARM_CLIENT_SECRET}"
    - export ARM_TENANT_ID="${ARM_TENANT_ID}"
  interruptible: true

# ---------------------------------------------------------------------------
# Environment templates
# ---------------------------------------------------------------------------
.dev:
  extends: .base
  variables:
    ENV_DIR: "${TF_ROOT}/dev/postgres-flex"
  environment:
    name: dev

.stg:
  extends: .base
  variables:
    ENV_DIR: "${TF_ROOT}/stg/postgres-flex"
  environment:
    name: stg

.prod:
  extends: .base
  variables:
    ENV_DIR: "${TF_ROOT}/prod/postgres-flex"
  environment:
    name: prod

# =============================================================================
# VALIDATE
# =============================================================================

validate:dev:
  extends: .dev
  stage: validate
  script:
    - cd "${ENV_DIR}"
    - terragrunt validate

validate:stg:
  extends: .stg
  stage: validate
  script:
    - cd "${ENV_DIR}"
    - terragrunt validate

validate:prod:
  extends: .prod
  stage: validate
  script:
    - cd "${ENV_DIR}"
    - terragrunt validate

# =============================================================================
# PLAN
# Runs on every pipeline.
# =============================================================================

plan:dev:
  extends: .dev
  stage: plan
  script:
    - cd "${ENV_DIR}"
    - terragrunt plan -out="${CI_PROJECT_DIR}/dev.tfplan"
  artifacts:
    name: dev-plan
    paths:
      - dev.tfplan
    expire_in: 1 week
  needs:
    - validate:dev

plan:stg:
  extends: .stg
  stage: plan
  script:
    - cd "${ENV_DIR}"
    - terragrunt plan -out="${CI_PROJECT_DIR}/stg.tfplan"
  artifacts:
    name: stg-plan
    paths:
      - stg.tfplan
    expire_in: 1 week
  needs:
    - validate:stg

plan:prod:
  extends: .prod
  stage: plan
  script:
    - cd "${ENV_DIR}"
    - terragrunt plan -out="${CI_PROJECT_DIR}/prod.tfplan"
  artifacts:
    name: prod-plan
    paths:
      - prod.tfplan
    expire_in: 1 week
  needs:
    - validate:prod

# =============================================================================
# APPLY
# All environments: apply always requires a manual trigger.
# =============================================================================

apply:dev:
  extends: .dev
  stage: apply
  script:
    - cd "${ENV_DIR}"
    - terragrunt apply -auto-approve
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
  allow_failure: false

apply:stg:
  extends: .stg
  stage: apply
  script:
    - cd "${ENV_DIR}"
    - terragrunt apply -auto-approve
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
  allow_failure: false

apply:prod:
  extends: .prod
  stage: apply
  script:
    - cd "${ENV_DIR}"
    - terragrunt apply -auto-approve
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
  allow_failure: false

# =============================================================================
# PLAN-DESTROY
# Runs automatically when CONFIRM_DESTROY=true so you can review what will be
# removed before clicking the destroy trigger.
# =============================================================================

plan-destroy:dev:
  extends: .dev
  stage: plan-destroy
  script:
    - cd "${ENV_DIR}"
    - terragrunt plan -destroy
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CONFIRM_DESTROY == "true"'

plan-destroy:stg:
  extends: .stg
  stage: plan-destroy
  script:
    - cd "${ENV_DIR}"
    - terragrunt plan -destroy
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CONFIRM_DESTROY == "true"'

plan-destroy:prod:
  extends: .prod
  stage: plan-destroy
  script:
    - cd "${ENV_DIR}"
    - terragrunt plan -destroy
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CONFIRM_DESTROY == "true"'

# =============================================================================
# DESTROY
# Only appears when CONFIRM_DESTROY=true. Requires a manual trigger after
# reviewing the plan-destroy output above.
# =============================================================================

destroy:dev:
  extends: .dev
  stage: destroy
  script:
    - cd "${ENV_DIR}"
    - terragrunt destroy -auto-approve
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CONFIRM_DESTROY == "true"'
      when: manual
  needs:
    - plan-destroy:dev
  allow_failure: false

destroy:stg:
  extends: .stg
  stage: destroy
  script:
    - cd "${ENV_DIR}"
    - terragrunt destroy -auto-approve
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CONFIRM_DESTROY == "true"'
      when: manual
  needs:
    - plan-destroy:stg
  allow_failure: false

destroy:prod:
  extends: .prod
  stage: destroy
  script:
    - cd "${ENV_DIR}"
    - terragrunt destroy -auto-approve
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CONFIRM_DESTROY == "true"'
      when: manual
  needs:
    - plan-destroy:prod
  allow_failure: false
