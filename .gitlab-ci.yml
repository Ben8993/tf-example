# =============================================================================
# GitLab CI/CD – Terragrunt / Azure PostgreSQL Flexible Server
#
# Pipeline behaviour
# ──────────────────
# • Every pipeline:           validate → plan  (both environments)
# • Merge to default branch:  apply available as a manual trigger (both environments)
#
# Required GitLab CI/CD variables  (Settings → CI/CD → Variables)
# ──────────────────────────────────────────────────────────────────
#   ARM_CLIENT_ID                 Service Principal app ID
#   ARM_CLIENT_SECRET             Service Principal secret        (masked)
#   ARM_TENANT_ID                 Azure AD tenant ID
#   ARM_SUBSCRIPTION_ID           Target Azure subscription ID
#   POSTGRES_ADMIN_PASSWORD_PROD      Prod DB admin password      (masked)
#   POSTGRES_ADMIN_PASSWORD_NONPROD   Non-prod DB admin password  (masked)
#   ARTIFACTORY_HOSTNAME              Artifactory hostname (e.g. artifactory.yourcompany.com)
#   ARTIFACTORY_REPO                  Artifactory Terraform provider repo name
#   ARTIFACTORY_TOKEN                 Artifactory identity token  (masked)
#
# CI_JOB_TOKEN and CI_PROJECT_ID are injected automatically by GitLab.
# =============================================================================

stages:
  - validate
  - plan
  - apply

# Pin image versions here – update as new releases are published.
variables:
  TG_IMAGE: "alpine/terragrunt:0.67.6"   # bundles Terraform ~1.9.x
  TF_ROOT:  "${CI_PROJECT_DIR}/environments"

# ---------------------------------------------------------------------------
# Base job template
# - Writes a .terraformrc that routes all provider downloads through
#   the Artifactory network mirror, so no provider is fetched directly
#   from registry.terraform.io.
# - Exports Azure credentials so the azurerm provider can authenticate.
# ---------------------------------------------------------------------------
.base:
  image: ${TG_IMAGE}
  before_script:
    - |
      cat > /tmp/.terraformrc <<EOF
      credentials "${ARTIFACTORY_HOSTNAME}" {
        token = "${ARTIFACTORY_TOKEN}"
      }
      provider_installation {
        network_mirror {
          url = "https://${ARTIFACTORY_HOSTNAME}/artifactory/${ARTIFACTORY_REPO}/"
        }
      }
      EOF
    - export TF_CLI_CONFIG_FILE=/tmp/.terraformrc
    - export ARM_CLIENT_ID="${ARM_CLIENT_ID}"
    - export ARM_CLIENT_SECRET="${ARM_CLIENT_SECRET}"
    - export ARM_TENANT_ID="${ARM_TENANT_ID}"
    - export ARM_SUBSCRIPTION_ID="${ARM_SUBSCRIPTION_ID}"
  interruptible: true

# ---------------------------------------------------------------------------
# Non-prod templates
# ---------------------------------------------------------------------------
.non-prod:
  extends: .base
  variables:
    ENV_DIR: "${TF_ROOT}/non-prod/postgres-flex"
  environment:
    name: non-prod

.prod:
  extends: .base
  variables:
    ENV_DIR: "${TF_ROOT}/prod/postgres-flex"
  environment:
    name: prod

# =============================================================================
# VALIDATE
# =============================================================================

validate:non-prod:
  extends: .non-prod
  stage: validate
  script:
    - cd "${ENV_DIR}"
    - terragrunt validate --terragrunt-non-interactive

validate:prod:
  extends: .prod
  stage: validate
  script:
    - cd "${ENV_DIR}"
    - terragrunt validate --terragrunt-non-interactive

# =============================================================================
# PLAN
# Runs on every pipeline.
# =============================================================================

plan:non-prod:
  extends: .non-prod
  stage: plan
  script:
    - cd "${ENV_DIR}"
    - terragrunt plan --terragrunt-non-interactive -out="${CI_PROJECT_DIR}/non-prod.tfplan"
  artifacts:
    name: non-prod-plan
    paths:
      - non-prod.tfplan
    expire_in: 1 week
  needs:
    - validate:non-prod

plan:prod:
  extends: .prod
  stage: plan
  script:
    - cd "${ENV_DIR}"
    - terragrunt plan --terragrunt-non-interactive -out="${CI_PROJECT_DIR}/prod.tfplan"
  artifacts:
    name: prod-plan
    paths:
      - prod.tfplan
    expire_in: 1 week
  needs:
    - validate:prod

# =============================================================================
# APPLY
# Both environments: plan runs automatically on merge to default branch,
# apply always requires a manual trigger.
# =============================================================================

apply:non-prod:
  extends: .non-prod
  stage: apply
  script:
    - cd "${ENV_DIR}"
    - terragrunt apply --terragrunt-non-interactive -auto-approve
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
  allow_failure: false

apply:prod:
  extends: .prod
  stage: apply
  script:
    - cd "${ENV_DIR}"
    - terragrunt apply --terragrunt-non-interactive -auto-approve
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
  allow_failure: false
